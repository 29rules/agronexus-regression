name: Monthly regression suite
on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:
jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install chromium webkit firefox
      - name: Run full regression suite
        run: npx playwright test
        env:
          BASE_URL: 'https://agronexustrading.in'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monthly-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monthly-results-${{ github.run_number }}
          path: test-results/
          retention-days: 90
      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"Agronexus regression FAILED on ${{ github.run_number }}. Check https://github.com/29rules/agronexus-regression/actions"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }}
